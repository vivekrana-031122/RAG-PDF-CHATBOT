name: 🚀 Feature Request
description: Suggest a new feature or improvement.
title: "[FEAT] <short description>"
labels: ["enhancement"]
assignees: ["vivekrana-031122"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is there a limitation you are working around?
      placeholder: "Currently there is no way to delete a session once created..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you would like to see.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Self-Check
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
