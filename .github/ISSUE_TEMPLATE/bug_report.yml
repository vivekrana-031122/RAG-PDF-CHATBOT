name: 🐛 Bug Report
description: Report something that is broken or behaves unexpectedly.
title: "[BUG] <short description>"
labels: ["bug", "needs-triage"]
assignees: ["vivekrana-031122"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I upload a PDF and ask a question, the API returns a 500 error..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behaviour.
      placeholder: |
        1. Start the FastAPI server with `uvicorn api:app --reload`
        2. POST a PDF to `/upload`
        3. POST a question to `/ask/{session_id}`
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, key dependencies.
      placeholder: |
        - OS: Ubuntu 22.04
        - Python: 3.11
        - LangChain: 0.2.x
        - FAISS: 1.7.x
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Error Output
      render: shell
